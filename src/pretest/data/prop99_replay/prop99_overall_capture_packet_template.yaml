- e(ci_upper)
capture_metadata_required_fields:
- capture_ready
- observed_years
- treat_time
- exact_counts_verified
- raw_e_snapshot_present
- graph_status
- numeric_fields_promoted
- protected_results_excluded
capture_metadata_blocked_defaults:
  capture_ready: false
  raw_e_snapshot_present: false
  numeric_fields_promoted: []
  protected_results_excluded: true
capture_metadata_requirements:
- precapture_contract is required before capture_ready may flip to true
- exact structural invariants from prop99_overall_precapture_contract.yaml must be
  verified before capture_ready may flip to true
- observed_years must be present before capture_ready may flip to true
- treat_time must be present before capture_ready may flip to true
- observed_years and treat_time must be present in metadata_payload and match prop99_overall_precapture_contract.yaml
  before capture_ready may flip to true
- fresh Stata rerun or committed raw e() snapshot is required before capture_ready
  may flip to true
- graph data must be exported as machine-readable YAML before parity closeout
- protected results remain excluded from authoritative comparison
activation_rule: The packet is capture-ready once the committed quartet matches the
  fresh overall rerun, graph_status is machine-checkable, and protected auxiliaries
  remain excluded from authoritative parity.
