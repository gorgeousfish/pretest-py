invariant_object:
  paper_anchor:
  - Appendix C.1
  - Appendix C.2
  - Appendix C.3
  parameter_vector: theta^Delta = (nu_bar_2,...,nu_bar_{t0-1}, delta_{t0},...,delta_T)
  covariance_object: Sigma^Delta
  severity_object: S_pre^Delta
  bias_bound: '|tau_bar - delta_bar| <= S_pre^Delta'
  indicator_rule: phi^Delta is the fail indicator 1{S_pre_hat^Delta > M}; pretest_pass
    = 1 - phi^Delta
  theory_note: Overall mode inherits the paper-first fail/pass semantics but swaps
    in theta^Delta and Sigma^Delta; treat e(theta) and e(S_pre_se) as protected auxiliaries,
    not authoritative parity targets.
cross_paper_appendix_c_authority:
  paper_refs:
  - paper/pretest_paper.md
  - paper/pretest_paper_cn.md
  bridge_markers:
  - nu_bar = A * nu
  - theta^Delta / Sigma^Delta
  authority_markers:
  - phi^Delta = 0
  - S_pre_hat^Delta <= M
  - kappa-free
  rule: Before any numeric promotion, keep Appendix C authority aligned across both
    papers so overall conditional inference stays tied to phi^Delta = 0 / S_pre_hat^Delta
    <= M and the overall conditional-CI half-width remains kappa-free.
command_contract:
  dataset: pretest-stata/prop99_smoking.dta
  sample_window:
  - 1985
  - 1995
  stata_steps:
  - use pretest-stata/prop99_smoking.dta, clear
  - keep if year >= 1985 & year <= 1995
  - pretest cigsale, treatment(treated) time(year) treat_time(1989) threshold(5) overall
capture_prerequisites:
- Fresh Stata rerun or committed raw e() snapshot for Analysis 4 in pretest-stata/examples/example_prop99.do.
- Verify the exact dataset/window counts and overall-mode structural invariants in
  prop99_overall_precapture_contract.yaml before promoting any numeric field.
- At the package helper boundary, capture_ready metadata is invalid unless a precapture_contract
  is supplied and the metadata payload carries observed_years plus treat_time matching
  prop99_overall_precapture_contract.yaml.
- observed_years and treat_time must both be present before capture_ready may flip
  to true at the package helper boundary.
- metadata_payload must remain null while capture_status stays blocked-pending-overall-oracle;
  once any partial capture facts exist, the status must move out of blocked state
  before helper ingestion.
- Machine-readable stdout capture at results/stata/PROP99-WINDOW-1985-1995-M5-OVERALL-stdout.yaml.
- Machine-readable stored-results capture at results/stata/PROP99-WINDOW-1985-1995-M5-OVERALL-stored-results.yaml.
- Graph-data export at results/stata/PROP99-WINDOW-1985-1995-M5-OVERALL-graph-data.yaml
