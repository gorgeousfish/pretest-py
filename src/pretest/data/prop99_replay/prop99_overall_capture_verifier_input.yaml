cross_checks:
- id: OVERALL-MODE-001
  rule: e(mode) must equal overall.
- id: OVERALL-MODE-002
  rule: e(kappa) must equal 1 in overall mode; README/help iterative-only wording
    is documentation drift under STATA-DOC-KAPPA-001 and must not demote overall e(kappa)
    out of authoritative capture fields.
- id: OVERALL-MODE-003
  rule: e(pretest_pass) must equal 1 - e(phi) when e(phi) is 0 or 1.
- id: OVERALL-MODE-004
  rule: Conditional CI fields may promote from unresolved to display_rounded only
    when data_valid = 1 and pretest_pass = 1; otherwise ci_lower/ci_upper must promote
    to exact_absence.
- id: OVERALL-MODE-005
  rule: Do not escalate e(theta) or e(S_pre_se) mismatches; record them as protected
    auxiliary outputs under STATA-OVERALL-AUX-001.
- id: OVERALL-MODE-006
  rule: If graph generation still ends with error 198 after valid scalar output, keep
    scalar replay eligible and record graph_status separately.
- id: OVERALL-MODE-007
  rule: Any future diagnostic use of overall auxiliaries must go through pretest_overall_auxiliary_contract.yaml
    and must not promote current Stata e(theta) or e(S_pre_se).
- id: OVERALL-MODE-008
  rule: Package-side capture_ready metadata must fail closed unless a precapture_contract
    is supplied and metadata_payload includes observed_years plus treat_time matching
    prop99_overall_precapture_contract.yaml.
- id: OVERALL-MODE-009
  rule: 'STATA-DOC-CI-OVERALL-001 keeps the generic help prose `kappa * S_pre` outside
    the overall executable oracle: overall mode has no kappa multiplier and the conditional-CI
    half-width stays kappa-free.'
- id: OVERALL-MODE-010
  rule: 'BUG-SC-001 keeps e(ATT), e(b), and e(V) as compatibility-only delta_bar
    aliases: if present in raw Stata output, record them diagnostically and never
    promote them into canonical ATT or authoritative replay buckets.'
